<div id="va-wrap">
  <div id="va-card" class="va-hidden">
    <div id="va-lbl">Tap to ask anything</div>
    <div id="va-msg"></div>
    <div id="va-dots"><span></span><span></span><span></span></div>
  </div>
  <button id="va-btn" onclick="vaToggle()" aria-label="Voice assistant">
    <span class="va-ring"></span><span class="va-ring"></span>
    <svg id="va-mic-icon" viewBox="0 0 24 24" fill="none">
      <rect x="9" y="2" width="6" height="12" rx="3" fill="white"/>
      <path d="M5 11a7 7 0 0 0 14 0" stroke="white" stroke-width="1.6" stroke-linecap="round" fill="none"/>
      <line x1="12" y1="18" x2="12" y2="21" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
      <line x1="9" y1="21" x2="15" y2="21" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
    <svg id="va-stop-icon" viewBox="0 0 24 24" fill="none">
      <rect x="7" y="7" width="10" height="10" rx="2" fill="white"/>
    </svg>
  </button>
</div>
